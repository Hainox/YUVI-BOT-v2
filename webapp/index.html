<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0a18" />
  <title>Yuvi скам</title>

  <link rel="stylesheet" href="slot.css" />
  <link rel="stylesheet" href="webapp.css" />

  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- React + Babel — same pinned versions as the design build -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- 1. Telegram shim + API client (plain JS, load before babel scripts) -->
  <script src="telegram.js"></script>
  <script src="api.js"></script>

  <!-- 2. Slot domain data (babel) -->
  <script type="text/babel" src="slot-data.jsx"></script>

  <!-- 3. Dev mock API (babel — runs AFTER slot-data populates SLOT_DATA) -->
  <script type="text/babel" src="api-mock.jsx"></script>

  <!-- 4. Slot UI pieces -->
  <script type="text/babel" src="slot-reel.jsx"></script>
  <script type="text/babel" src="slot-ui.jsx"></script>
  <script type="text/babel" src="slot-skins.jsx"></script>
  <script type="text/babel" src="slot-machine.jsx"></script>

  <!-- 5. Screens -->
  <script type="text/babel" src="menu.jsx"></script>
  <script type="text/babel" src="slot-screen.jsx"></script>
  <script type="text/babel" src="history.jsx"></script>
  <script type="text/babel" src="stats.jsx"></script>
  <script type="text/babel" src="rules.jsx"></script>

  <!-- 6. Router root — last -->
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
