server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index 200.html;

  # Reverse-proxy to the api container (docker-compose service "api",
  # same yuvibotv2_default network). lib/api.ts/lib/sse.ts build requests
  # against window.location.origin (relative /api/v1/... paths) so the
  # Mini App and the api backend must appear same-origin to the browser —
  # without this the API/SSE calls would 404 against nginx's own static
  # root. FastAPI routes already carry the full "/api/v1/..." path
  # themselves, so proxy_pass has no trailing URI (passes the request URI
  # through unchanged).
  location /api/ {
    proxy_pass http://api:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # SSE (GET /api/v1/events): no buffering, long-lived connection.
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    chunked_transfer_encoding off;
  }

  # SvelteKit adapter-static SPA fallback (fallback: '200.html', prerender=false
  # on every route via +layout.ts) — every unmatched path serves the client
  # app shell, which then does its own client-side routing.
  location / {
    try_files $uri /200.html;
  }
}

