server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index 200.html;

  # SvelteKit adapter-static SPA fallback (fallback: '200.html', prerender=false
  # on every route via +layout.ts) — every unmatched path serves the client
  # app shell, which then does its own client-side routing.
  location / {
    try_files $uri /200.html;
  }
}

