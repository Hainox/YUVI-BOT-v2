name: yuvibotv2

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: yuvi
      POSTGRES_USER: yuvi
      POSTGRES_PASSWORD: yuvi
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]

  migrations:
    build:
      context: .
      dockerfile: bot.Dockerfile
    env_file:
      - .env
    command: alembic upgrade head
    depends_on:
      - postgres

  # Self-hosted media-download backend (MEDIA-01/02, DEPLOY-01) — внутренний
  # сервис без внешних портов, как nlp/redis; бот обращается по внутреннему
  # COBALT_API_URL=http://cobalt:9000/ (docker DNS-имя сервиса).
  cobalt:
    image: ghcr.io/imputnet/cobalt:11
    restart: unless-stopped
    init: true
    read_only: true
    environment:
      # API_URL обязателен даже для внутреннего инстанса — без него
      # tunnel/redirect-ссылки в ответах cobalt нерабочие (06-RESEARCH.md
      # Pitfall 5).
      API_URL: "http://cobalt:9000/"
    # Портов наружу НЕ открываем — только bot обращается к cobalt внутри
    # сети compose, как nlp:8000.

  bot:
    build:
      context: .
      dockerfile: bot.Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    # Личная MTProto-сессия для /backfill (Kurigram) — .dockerignore нарочно
    # исключает *.session из образа (не коммитим секреты в слои), поэтому
    # уже авторизованный файл сессии с хоста монтируется отдельно. Без этого
    # каждый пересозданный контейнер требовал бы новый интерактивный ввод
    # кода подтверждения, который некому принять в отсоединённом контейнере
    # (EOFError — см. docs/backfill-setup.md).
    volumes:
      - ./yuvi_backfill_session.session:/app/yuvi_backfill_session.session
    depends_on:
      - migrations
      - redis
      - postgres
      - cobalt

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    ports:
      - "8002:8000"

  nlp:
    build:
      context: .
      dockerfile: nlp/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8001:8000"

  miniapp:
    build:
      context: .
      dockerfile: miniapp/Dockerfile
    restart: unless-stopped
    ports:
      - "8003:80"

  # HTTPS edge for the Mini App (DEPLOY-05, D-01/D-02). Only activated when
  # the user sets COMPOSE_PROFILES=https in .env — absent from a default
  # `docker compose up`, so local/dev stays byte-for-byte plain HTTP on
  # miniapp:8003 (unchanged above). When active, terminates TLS in front of
  # the existing miniapp/api containers (neither is modified). Wrapper script
  # (nginx/docker-entrypoint-wrapper.sh) is a no-op (sleep infinity) whenever
  # DOMAIN is empty, so even an explicit `--profile https up` without a real
  # domain configured cannot crash-loop or bind ports incorrectly.
  nginx-https:
    image: jonasal/nginx-certbot:6.2.0-nginx1.31.2
    restart: unless-stopped
    profiles: ["https"]
    environment:
      DOMAIN: ${DOMAIN}
      CERTBOT_EMAIL: ${CERTBOT_EMAIL}
      # Let's Encrypt STAGING environment has much higher rate limits — keep
      # this on (1) while testing, switch to 0 only for the real prod issuance
      # (docs/deploy-vps-ubuntu.md §5, T-04.3-10).
      STAGING: ${STAGING:-1}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - nginx_https_secrets:/etc/letsencrypt
      - ./nginx/https.conf.template:/etc/nginx/templates/https.conf.template:ro
      - ./nginx/docker-entrypoint-wrapper.sh:/docker-entrypoint-wrapper.sh:ro
    entrypoint: ["/bin/sh", "/docker-entrypoint-wrapper.sh"]
    depends_on:
      - miniapp
      - api

volumes:
  pgdata:
  nginx_https_secrets:

