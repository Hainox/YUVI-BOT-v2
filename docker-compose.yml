services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: yuvi
      POSTGRES_USER: yuvi
      POSTGRES_PASSWORD: yuvi
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]

  migrations:
    build:
      context: .
      dockerfile: bot.Dockerfile
    env_file:
      - .env
    command: alembic upgrade head
    depends_on:
      - postgres

  bot:
    build:
      context: .
      dockerfile: bot.Dockerfile
    env_file:
      - .env
    depends_on:
      - migrations
      - redis
      - postgres

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    ports:
      - "8002:8000"

  nlp:
    build:
      context: .
      dockerfile: nlp/Dockerfile
    env_file:
      - .env
    ports:
      - "8001:8000"

  miniapp:
    build:
      context: .
      dockerfile: miniapp/Dockerfile
    ports:
      - "8003:80"

volumes:
  pgdata:

